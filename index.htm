<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResiHub — Student Housing Near Campus</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="topbar">
    <div class="logo">ResiHub</div>
    <button id="menuToggle" class="hamburger" aria-label="Open menu"><i class="fa-solid fa-bars"></i></button>
    <div class="topbar-actions" id="topbarActions">
      <a href="student_login.htm" class="btn-text"><i class="fa-solid fa-user-graduate"></i> Student login</a>
      <a href="student_signup.htm" class="btn-text"><i class="fa-solid fa-user-plus"></i> Student signup</a>
      <a href="landlord_login.htm" class="btn-text"><i class="fa-solid fa-house"></i> Landlord login</a>
      <a href="landlord_signup.htm" class="btn-text"><i class="fa-solid fa-house-circle-plus"></i> Landlord signup</a>
      <button id="listBtn" class="btn-outline"><i class="fa-solid fa-plus"></i> List a room</button>
      <button id="themeToggle" class="btn-text" aria-label="Toggle dark mode"><i class="fa-solid fa-moon"></i></button>
    </div>
  </header>

  <main>
    <div class="filter-bar">
      <span><i class="fa-solid fa-location-dot"></i></span>
      <select id="campusFilter">
        <option value="All">All areas</option>
        <option value="Akoka">Akoka</option>
        <option value="Bariga">Bariga</option>
        <option value="Yabatech GRA">Yabatech GRA</option>
      </select>
      <span><i class="fa-solid fa-naira-sign"></i></span>
      <label for="priceFilter">Max price: ₦<span id="priceValue">200,000</span></label>
      <input type="range" id="priceFilter" min="20000" max="2000000" step="5000" value="200000">
    </div>

    <section id="listings">
      <div id="listingCards"></div>
      <p id="emptyState" class="empty-state">No listings yet — check back soon.</p>
    </section>
  </main>

  <!-- List a room modal (landlord must be logged in) -->
  <div id="listRoomModal" class="modal hidden">
    <div class="modal-box">
      <button class="modal-close" data-close="listRoomModal"><i class="fa-solid fa-xmark"></i></button>
      <h2><i class="fa-solid fa-house-circle-plus"></i> List a room</h2>
      <form id="listRoomForm">
        <div class="input-icon"><i class="fa-solid fa-phone"></i><input type="tel" placeholder="Contact phone number"
            required></div>
        <div class="input-icon"><i class="fa-solid fa-naira-sign"></i><input type="number"
            placeholder="Price per year (₦)" required></div>
        <select required>
          <option value="">Room type</option>
          <option value="self-con">Self-contain</option>
          <option value="1bedroom">1 bedroom</option>
          <option value="shared">Shared room</option>
        </select>
        <select required>
          <option value="">Area</option>
          <option value="Akoka">Akoka</option>
          <option value="Bariga">Bariga</option>
          <option value="Yabatech GRA">Yabatech GRA</option>
        </select>
        <input type="file" id="listingPhotos" accept="image/*" multiple required>
        <p class="form-hint"><i class="fa-solid fa-circle-info"></i> Upload at least 2 photos of the room.</p>
        <button type="submit" class="btn-primary"><i class="fa-solid fa-paper-plane"></i> Submit listing</button>
      </form>
    </div>
  </div>

  <!-- Admin login modal -->
  <div id="adminLoginModal" class="modal hidden">
    <div class="modal-box">
      <button class="modal-close" data-close="adminLoginModal"><i class="fa-solid fa-xmark"></i></button>
      <h2><i class="fa-solid fa-user-shield"></i> Admin login</h2>
      <form id="adminLoginForm">
        <div class="input-icon"><i class="fa-solid fa-envelope"></i><input type="email" placeholder="Admin email"
            required></div>
        <div class="input-icon"><i class="fa-solid fa-lock"></i><input type="password" placeholder="Password" required>
        </div>
        <button type="submit" class="btn-primary"><i class="fa-solid fa-right-to-bracket"></i> Continue</button>
      </form>
    </div>
  </div>

  <!-- Admin panel (shown after admin login) -->
  <section id="adminPanel" class="admin-panel hidden">
    <h2><i class="fa-solid fa-user-shield"></i> Admin panel</h2>
    <button id="addListingBtn" class="btn-outline"><i class="fa-solid fa-plus"></i> Add listing</button>
    <table id="usersTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Role</th>
          <th>Contact</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- rows populated dynamically -->
      </tbody>
    </table>
  </section>

  <script src="index.js"></script>
</body>

</html>
