<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Signup — ResiHub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">

  <a href="index.htm" class="auth-logo">ResiHub</a>
  <button id="themeToggle" class="btn-text" aria-label="Toggle dark mode"><i class="fa-solid fa-moon"></i></button>

  <div class="auth-box enter-default">
    <h2>Student signup</h2>

    <form id="studentSignupForm">
      <input type="text" placeholder="Full name" required>
      <input type="email" placeholder="Email" required>
      <input type="tel" placeholder="Phone number" id="phone" name="phone" pattern="[0-9]+"
        title="Only numbers are allowed" required>
      <input type="password" placeholder="Password" required>
      <input type="password" placeholder="Confirm password" required>
      <button type="submit" class="btn-primary">Create account</button>
    </form>

    <div class="auth-divider"><span>or</span></div>

    <div class="social-buttons">
      <button type="button" class="btn-social google" data-provider="google"><i class="fa-brands fa-google"></i>
        Continue with Google</button>
      <button type="button" class="btn-social facebook" data-provider="facebook"><i class="fa-brands fa-facebook"></i>
        Continue with Facebook</button>
      <button type="button" class="btn-social apple" data-provider="apple"><i class="fa-brands fa-apple"></i> Continue
        with Apple</button>
    </div>
    <p class="auth-switch">Already have an account? <a href="student_login.htm">Log in</a></p>
    <a href="index.htm" class="auth-back">&larr; Back to home</a>
  </div>

  <script src="index.js"></script>
</body>

</html>
