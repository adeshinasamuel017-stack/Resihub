<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login — ResiHub</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">

  <a href="index.html" class="auth-logo">ResiHub</a>

  <div class="auth-box">
    <h2>Student login</h2>
    <form id="studentAuthForm">
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Password" required>
      <button type="submit" class="btn-primary">Continue</button>
    </form>
    <p class="auth-switch">Create new account? <a href="student_signup.htm">Sign up</a></p>
    <a href="index.htm" class="auth-back">&larr; Back to home</a>
  </div>

</body>

</html>
