<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landlord Signup — ResiHub</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <a href="index.html" class="auth-logo">ResiHub</a>

  <div class="auth-box">
    <h2>Landlord signup</h2>
    <form id="landlordSignupForm">
      <input type="text" placeholder="Full name" required>
      <input type="tel" placeholder="Phone number" required>
      <input type="email" placeholder="Email (optional)">
      <input type="password" placeholder="Password" required>
      <input type="password" placeholder="Confirm password" required>
      <button type="submit" class="btn-primary">Create account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="landlord_login.htm">Log in</a></p>
    <a href="index.htm" class="auth-back">&larr; Back to home</a>
  </div>

</body>
</html>
